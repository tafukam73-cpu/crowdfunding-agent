services:
  db:
    image: postgres:16
    container_name: cfagent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: cfagent-backend
    restart: unless-stopped
    # .env 全体をコンテナへ注入（ANTHROPIC_API_KEY / SLACK_WEBHOOK_URL /
    # APP_BASE_URL / GMAIL_* / SCRAPE_* 等を backend が読めるようにする）。
    env_file:
      - .env
    environment:
      # env_file より優先。db はコンテナ名を指すため明示する。
      DATABASE_URL: ${DATABASE_URL}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Step 1 は開発しやすいようソースをマウント（ホットリロード）
      - ./backend:/app
    # 起動時に Alembic マイグレーションを適用してから API を起動
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    container_name: cfagent-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # Docker ボリュームマウント環境でホットリロードを効かせるためポーリングを有効化
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      # node_modules はコンテナ側を使う（ホストの空ディレクトリで上書きしない）
      - /app/node_modules
      - /app/.next

volumes:
  db_data:
